# Compound metadata v1.5 — single source of truth for the 24-compound starter catalog.
#
# This file mirrors `Sources/Models/CompoundCatalog.swift -> allCompoundsSeed`.
# Loaded into Supabase by `scripts/seed_compound_metadata.ts`.
#
# Schema: see supabase/migrations/20260421000001_compound_metadata_v2.sql
#
# Field reference:
#   slug                     stable identifier
#   name                     display name
#   half_life_hrs            elimination half-life
#   dosing_range_low_mcg     low end of single dose
#   dosing_range_high_mcg    high end of single dose
#   benefits                 array of bullet points
#   side_effects             array of bullet points
#   stacking_notes           free text
#   fda_status               research | grey | approved
#   summary_md               1-paragraph background
#   goal_categories          array (recovery, growth, fat_loss, longevity,
#                            cognitive, libido, skin_hair, immune, sleep)
#   administration_routes    array (subq, im, oral, nasal)
#   time_to_effect_hours     onset
#   peak_effect_hours        Tmax
#   duration_hours           approximate duration of action
#   dosing_formula           safe expression: clamp(weightKg * X, lo, hi)
#   dosing_unit              mcg | mg
#   dosing_frequency         daily | 2x_weekly | 3x_weekly | weekly | as_needed
#   bac_water_ml_default     default reconstitution volume
#   storage_temp             refrigerated | frozen | room
#   storage_max_days         shelf life after reconstitution
#   needle_gauge_default     e.g. 29G
#   needle_length_default    e.g. "1/2 inch"
#   recommended_site_ids     array of pin_site ids (see PinSiteCatalog.swift)

